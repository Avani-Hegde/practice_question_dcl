 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body{
      display: flex;
      height:100vh;
      justify-content: center;
      align-items: center;
    }
    .container{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: red;
      padding:20px;
      border-radius: 20px;
      width:350px;
      #generate{
        padding:8px;
        width: fit-content;
        border-radius: 10px;
        border:none;
        border:1px solid black;
        color:red;
        cursor: pointer;
      }
    }
    i{
      cursor: pointer;
    }
    h1{
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <button id="generate">
      generate Password:
    </button>
    <h1 id="pass">
      password
    </h1>
    <button id="btn" onclick="copy()"><i class="fa-solid fa-copy"></i></button>
  </div>
  <script src="password1.js"></script>
</body>
</html>
