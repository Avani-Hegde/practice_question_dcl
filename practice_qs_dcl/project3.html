 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Background */

body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
flex-direction:column;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:black;
color:white;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
font-size:18px;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
background:#00ffff;
left:0;
bottom:-5px;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

/* Main container */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* Form */

.form-box{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

/* Inputs */

.input-group{
position:relative;
margin:22px 0;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid gray;
border-radius:5px;
font-size:15px;
outline:none;
}

.input-group label{
position:absolute;
left:12px;
top:12px;
color:gray;
font-size:14px;
background:white;
padding:0 5px;
transition:0.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:12px;
color:#667eea;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#764ba2;
transform:scale(1.05);
}

/* Cards */

.cards{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
justify-content:center;
}

/* Footer */

footer{
text-align:center;
color:white;
padding:15px;
font-size:14px;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav>
<h2>MySite</h2>

<ul>
<li><a href="project.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<!-- Contact Form -->

<div class="container">

<div class="form-box">

<h2>Contact Us</h2>

<div class="input-group">
<input type="text" id="nam" placeholder=" " required>
<label>First Name</label>
</div>

<div class="input-group">
<input type="text" id="las" placeholder=" " required>
<label>Last Name</label>
</div>

<div class="input-group">
<input type="email" id="email" placeholder=" " required>
<label>Email</label>
</div>

<div class="input-group">
<input type="tel" id="con" placeholder=" " required>
<label>Contact Number</label>
</div>

<button id="submit">Submit</button>

</div>

<div class="cards"></div>

</div>

<footer>
<p>© 2026 My Website</p>
</footer>

<script src="project.js"></script>

</body>
</html>
