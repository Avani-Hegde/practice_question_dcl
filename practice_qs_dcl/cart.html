<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart quantity:</title>
</head>
<body>
   
    <script src="cart.js">

    </script>
    <button onclick="
    cartquantity=0
    console.log(`show cartquantity:${cartquantity}`)">
        show quantity
    </button>
    <button onclick="
    cartquantity=cartquantity+1
    console.log(`add to cart ${cartquantity}`)">
        add to cart
    </button>
    <button onclick="
    cartquantity=cartquantity+2
    console.log(`+2 ${cartquantity}`)">
        +2
    </button>
    <button onclick="
    cartquantity=cartquantity+3
    console.log(`+3 ${cartquantity
    }`)">
        +3
    </button>
    <button onclick="
    cartquantity=0
    console.log(cartquantity)">
    reset
    </button>

    
</body>
